name: saha_2559
description: Saha 2559 - Polis mevzuat, saha, haklar, teşkilat ve kültür için offline Flutter uygulaması.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.10
  isar_generator: ^3.1.0+1
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  web:
    generate: true
    background_color: "#1a2332"
    theme_color: "#1a2332"
  windows:
    generate: true
    icon_size: 48
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#1a2332"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/mevzuat/
    - assets/mevzuat/kanunlar/
    - assets/mevzuat/yonetmelikler/
    - assets/json/law_articles.json
    - assets/json/city_contacts.json
    - assets/json/martyrs.json
    - assets/json/field_cards.json
    - assets/images/
    - assets/images/atatürk.jpg

